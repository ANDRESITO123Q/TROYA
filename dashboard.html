<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TROYA — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --gold:#C8960C;--gold2:#E0AB2A;--brown:#3B2A14;--brown2:#7A5C2E;
  --dark:#080e1c;--dark2:#0d1525;--off:#f7f5f1;--border:#e5e0d8;
  --white:#fff;--font:'Montserrat',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);--ease-back:cubic-bezier(.34,1.56,.64,1);
  --sidebar:260px;--nav-h:64px;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --shadow-md:0 8px 32px rgba(0,0,0,.12);
}
html{scroll-behavior:smooth;}
body{font-family:var(--font);background:var(--off);color:var(--brown);-webkit-font-smoothing:antialiased;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}
ul{list-style:none;}
button{cursor:pointer;border:none;background:none;font:inherit;}

/* ── Animaciones ── */
@keyframes fadeUp    {from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes fadeLeft  {from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
@keyframes fadeIn    {from{opacity:0}to{opacity:1}}
@keyframes zoomIn    {from{opacity:0;transform:scale(.93)}to{opacity:1;transform:none}}
@keyframes slideDown {from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes countUp   {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes shimmer   {0%{background-position:-400px 0}100%{background-position:400px 0}}
50%{box-shadow:0 0 0 8px rgba(200,150,12,0)}}
}
@keyframes barGrow   {from{width:0}to{width:var(--w,60%)}}
@keyframes dotBlink  {0%,80%,100%{opacity:0}40%{opacity:1}}

.anim-fadeup   {animation:fadeUp .6s var(--ease) both;}
.anim-fadein   {animation:fadeIn .5s var(--ease) both;}
.anim-zoomin   {animation:zoomIn .55s var(--ease-back) both;}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}
.d4{animation-delay:.24s}.d5{animation-delay:.30s}.d6{animation-delay:.36s}
.d7{animation-delay:.42s}.d8{animation-delay:.48s}

/* Skeleton loader */
.skeleton{background:linear-gradient(90deg,#ede9e1 25%,#f5f2ec 50%,#ede9e1 75%);background-size:400px 100%;animation:shimmer 1.2s infinite;border-radius:6px;}

/* ── LAYOUT ── */
.dash-layout{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);min-height:100vh;
  background:linear-gradient(170deg,var(--dark) 0%,var(--dark2) 100%);
  position:fixed;top:0;left:0;bottom:0;z-index:200;
  display:flex;flex-direction:column;
  transition:transform .4s var(--ease),box-shadow .3s;
  box-shadow:4px 0 24px rgba(0,0,0,.18);
}
.sidebar-logo{
  padding:22px 24px 18px;
  display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.sidebar-logo img{width:44px;height:44px;object-fit:contain;transition:transform .4s var(--ease);}
.sidebar-logo:hover img{transform:scale(1.08) rotate(-3deg);}
.sidebar-logo-text{display:flex;flex-direction:column;gap:3px;}
.sidebar-brand{font-size:1.35rem;font-weight:800;letter-spacing:.1em;color:white;line-height:1;}
.sidebar-line{height:1.5px;background:linear-gradient(90deg,var(--gold),#8B6914);border-radius:2px;}

/* User info */
.sidebar-user{
  padding:18px 20px 14px;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.user-avatar{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--brown));
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:white;
  margin-bottom:10px;flex-shrink:0;
  animation:pulse 3s ease infinite;
}
.user-name{font-size:13px;font-weight:700;color:white;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;letter-spacing:.1em;
  padding:3px 9px;border-radius:20px;
  background:rgba(200,150,12,.15);color:var(--gold);
  border:1px solid rgba(200,150,12,.25);
}

/* Nav links */
.sidebar-nav{flex:1;padding:14px 12px;overflow-y:auto;}
.nav-section{font-size:9.5px;font-weight:700;letter-spacing:.16em;color:rgba(255,255,255,.22);padding:10px 10px 6px;text-transform:uppercase;}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 12px;border-radius:8px;
  font-size:12.5px;font-weight:600;color:rgba(255,255,255,.55);
  cursor:pointer;margin-bottom:2px;
  transition:all .25s var(--ease);position:relative;
}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);}
.nav-item.active{background:rgba(200,150,12,.15);color:var(--gold);}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:4px;bottom:4px;
  width:3px;background:var(--gold);border-radius:0 2px 2px 0;
}
.nav-item svg{flex-shrink:0;opacity:.7;transition:opacity .2s;}
.nav-item.active svg,.nav-item:hover svg{opacity:1;}
.nav-badge{
  margin-left:auto;min-width:18px;height:18px;border-radius:9px;
  background:var(--gold);color:var(--dark);
  font-size:10px;font-weight:700;
  display:flex;align-items:center;justify-content:center;padding:0 5px;
}

/* Plan card en sidebar */
.sidebar-plan{
  margin:12px;border-radius:10px;
  background:rgba(200,150,12,.08);
  border:1px solid rgba(200,150,12,.2);padding:16px;
}
.plan-label{font-size:9.5px;font-weight:700;letter-spacing:.14em;color:var(--gold);margin-bottom:4px;}
.plan-name-s{font-size:14px;font-weight:700;color:white;margin-bottom:10px;}
.plan-upgrade-btn{
  width:100%;padding:9px;background:var(--gold);color:var(--dark);
  border-radius:6px;font-family:var(--font);font-size:11.5px;
  font-weight:700;letter-spacing:.08em;border:none;cursor:pointer;
  transition:background .2s,transform .2s;
}
.plan-upgrade-btn:hover{background:var(--gold2);transform:translateY(-1px);}

/* Logout */
.sidebar-footer{padding:14px 12px;border-top:1px solid rgba(255,255,255,.07);}
.logout-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;
  font-size:12.5px;font-weight:600;color:rgba(255,255,255,.45);
  transition:all .25s;
}
.logout-btn:hover{background:rgba(255,100,100,.1);color:#ff6b6b;}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:var(--sidebar);right:0;height:var(--nav-h);
  background:rgba(255,255,255,.97);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 32px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  transition:left .4s var(--ease);
}
.topbar-left{display:flex;align-items:center;gap:14px;}
.menu-toggle{
  display:none;padding:8px;border-radius:6px;
  transition:background .2s;
}
.menu-toggle:hover{background:var(--off);}
.page-title{font-size:1.05rem;font-weight:700;color:var(--brown);letter-spacing:.02em;}
.page-subtitle{font-size:12px;color:var(--brown2);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-btn{
  width:38px;height:38px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .2s;color:var(--brown2);
  position:relative;
}
.topbar-btn:hover{background:var(--off);transform:scale(1.05);}
.notif-dot{
  position:absolute;top:7px;right:7px;
  width:8px;height:8px;border-radius:50%;
  background:var(--gold);border:2px solid white;
}
.topbar-avatar{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--brown));
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:white;cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.topbar-avatar:hover{transform:scale(1.08);box-shadow:0 4px 14px rgba(200,150,12,.3);}

/* ── MAIN CONTENT ── */
.main-content{
  margin-left:var(--sidebar);margin-top:var(--nav-h);
  padding:32px;min-height:calc(100vh - var(--nav-h));
  transition:margin-left .4s var(--ease);
}

/* ── WELCOME BANNER ── */
.welcome-banner{
  background:linear-gradient(110deg,var(--dark) 0%,var(--dark2) 60%,#0a1628 100%);
  border-radius:14px;padding:28px 32px;margin-bottom:28px;
  position:relative;overflow:hidden;
}

.wb-circles{position:absolute;right:-40px;top:-40px;}
.wb-c1{width:200px;height:200px;border-radius:50%;background:rgba(200,150,12,.08);position:absolute;top:0;right:0;}
.wb-c2{width:140px;height:140px;border-radius:50%;background:rgba(200,150,12,.06);position:absolute;top:30px;right:30px;}
.wb-content{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.wb-greeting{font-size:12px;font-weight:600;letter-spacing:.14em;color:var(--gold);margin-bottom:6px;}
.wb-title{font-size:clamp(1.3rem,2.5vw,1.8rem);font-weight:800;color:white;margin-bottom:6px;}
.wb-sub{font-size:13px;color:rgba(255,255,255,.6);line-height:1.6;}
.wb-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 22px;background:var(--gold);color:var(--dark);
  border-radius:6px;font-family:var(--font);font-size:12px;
  font-weight:700;letter-spacing:.08em;border:none;cursor:pointer;
  transition:background .2s,transform .2s,box-shadow .2s;
}
.btn-primary:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 8px 20px rgba(200,150,12,.3);}
.btn-secondary{
  display:inline-flex;align-items:center;gap:8px;
  padding:11px 22px;background:rgba(255,255,255,.1);color:white;
  border-radius:6px;font-family:var(--font);font-size:12px;
  font-weight:600;letter-spacing:.06em;border:1px solid rgba(255,255,255,.2);cursor:pointer;
  transition:all .2s;
}
.btn-secondary:hover{background:rgba(255,255,255,.18);transform:translateY(-2px);}

/* ── STATS GRID ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px;}
.stat-card{
  background:white;border-radius:12px;padding:22px 20px;
  border:1px solid var(--border);
  transition:transform .3s var(--ease),box-shadow .3s;
  position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  transform:scaleX(0);transform-origin:left;
  transition:transform .4s var(--ease);
}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-md);}
.stat-card:hover::before{transform:scaleX(1);}
.stat-icon{
  width:42px;height:42px;border-radius:10px;
  background:rgba(200,150,12,.1);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);margin-bottom:14px;
  transition:transform .3s var(--ease-back);
}
.stat-card:hover .stat-icon{transform:scale(1.1) rotate(-5deg);}
.stat-val{font-size:1.9rem;font-weight:800;color:var(--brown);line-height:1;margin-bottom:4px;}
.stat-label{font-size:12px;color:var(--brown2);margin-bottom:10px;}
.stat-change{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;
}
.stat-change.up{color:#22c55e;}
.stat-change.down{color:#ef4444;}
.stat-change.neutral{color:var(--brown2);}

/* ── SECCIÓN 2 columnas ── */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-bottom:28px;}
.dash-grid.full{grid-template-columns:1fr;}
.dash-grid.sidebar-layout{grid-template-columns:1.6fr 1fr;}

/* ── CARD GENÉRICA ── */
.card{
  background:white;border-radius:12px;
  border:1px solid var(--border);overflow:hidden;
  box-shadow:var(--shadow);
}
.card-header{
  padding:18px 22px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.card-title{font-size:13.5px;font-weight:700;color:var(--brown);display:flex;align-items:center;gap:9px;}
.card-title svg{color:var(--gold);}
.card-action{
  font-size:11.5px;font-weight:600;color:var(--gold);
  cursor:pointer;transition:color .2s;
  display:flex;align-items:center;gap:4px;
}
.card-action:hover{color:var(--gold2);}
.card-body{padding:20px 22px;}

/* ── TABLA ── */
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{
  font-size:10.5px;font-weight:700;letter-spacing:.1em;
  color:var(--brown2);text-transform:uppercase;
  padding:10px 14px;text-align:left;
  border-bottom:2px solid var(--border);white-space:nowrap;
}
td{
  padding:13px 14px;font-size:13px;color:var(--brown);
  border-bottom:1px solid rgba(229,224,216,.5);
}
tr:last-child td{border-bottom:none;}
tr{transition:background .2s;}
tr:hover td{background:rgba(200,150,12,.04);}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;
}
.badge-ok{background:rgba(34,197,94,.1);color:#16a34a;}
.badge-pending{background:rgba(200,150,12,.1);color:var(--brown2);}
.badge-alert{background:rgba(239,68,68,.08);color:#dc2626;}
.badge-info{background:rgba(59,130,246,.08);color:#2563eb;}

/* ── PROGRESS BAR ── */
.progress-wrap{margin-bottom:16px;}
.progress-info{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12.5px;}
.progress-label{font-weight:600;color:var(--brown);}
.progress-val{font-weight:700;color:var(--gold);}
.progress-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{
  height:100%;border-radius:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  width:0;transition:width 1.2s var(--ease);
}

/* ── ACTIVIDAD ── */
.activity-list{display:flex;flex-direction:column;gap:0;}
.activity-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:13px 0;border-bottom:1px solid rgba(229,224,216,.5);
}
.activity-item:last-child{border-bottom:none;}
.activity-dot{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;margin-top:1px;
}
.activity-dot.gold{background:rgba(200,150,12,.12);color:var(--gold);}
.activity-dot.green{background:rgba(34,197,94,.1);color:#16a34a;}
.activity-dot.blue{background:rgba(59,130,246,.08);color:#2563eb;}
.activity-dot.red{background:rgba(239,68,68,.08);color:#dc2626;}
.activity-content{}
.activity-title{font-size:13px;font-weight:600;color:var(--brown);margin-bottom:2px;}
.activity-sub{font-size:11.5px;color:var(--brown2);}
.activity-time{font-size:11px;color:#bbb;margin-left:auto;flex-shrink:0;padding-top:2px;}

/* ── QUICK ACTIONS ── */
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.qa-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  padding:20px 12px;border-radius:10px;border:1.5px solid var(--border);
  background:white;cursor:pointer;text-align:center;
  transition:all .3s var(--ease);
}
.qa-btn:hover{border-color:var(--gold);background:#faf7f0;transform:translateY(-3px);box-shadow:0 8px 24px rgba(200,150,12,.12);}
.qa-icon{
  width:44px;height:44px;border-radius:10px;
  background:rgba(200,150,12,.1);
  display:flex;align-items:center;justify-content:center;
  color:var(--gold);transition:transform .3s var(--ease-back);
}
.qa-btn:hover .qa-icon{transform:scale(1.12) rotate(-5deg);}
.qa-label{font-size:12px;font-weight:700;color:var(--brown);}
.qa-sub{font-size:10.5px;color:var(--brown2);}

/* ── LOADING OVERLAY ── */







.loading-dot:nth-child(1){animation:dotBlink 1.2s .0s infinite;}
.loading-dot:nth-child(2){animation:dotBlink 1.2s .2s infinite;}
.loading-dot:nth-child(3){animation:dotBlink 1.2s .4s infinite;}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;}
.empty-icon{width:56px;height:56px;border-radius:14px;background:rgba(200,150,12,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;color:var(--gold);}
.empty-title{font-size:14px;font-weight:700;color:var(--brown);margin-bottom:6px;}
.empty-sub{font-size:13px;color:var(--brown2);margin-bottom:18px;}

/* ── PLAN ALERT BANNER ── */
.plan-alert{
  display:flex;align-items:center;gap:14px;
  background:rgba(200,150,12,.06);border:1px solid rgba(200,150,12,.2);
  border-radius:10px;padding:14px 20px;margin-bottom:22px;
}

.fg label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brown2);}

.t-toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:9px;font-family:var(--font);font-size:13px;font-weight:600;z-index:99999;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;max-width:300px;}
.t-toast.show{opacity:1;transform:none;}
.t-toast-ok{background:var(--brown);color:#fff;}.t-toast-warn{background:#f59e0b;color:#fff;}.t-toast-err{background:#ef4444;color:#fff;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;}
.modal-box{background:#fff;border-radius:14px;padding:26px 24px 22px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:1rem;font-weight:800;color:var(--brown);margin:0 0 16px;font-family:var(--font);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--brown2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.form-group input,.form-group select{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:7px;font-family:var(--font);font-size:13px;color:var(--brown);background:#fff;box-sizing:border-box;}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--gold);}
.btn-modal-ok{width:100%;padding:11px;background:var(--gold);color:var(--dark);border:none;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;}
.btn-modal-ok:hover{background:var(--gold2);}
.btn-modal-cancel{width:100%;padding:9px;background:transparent;color:var(--brown2);border:1.5px solid var(--border);border-radius:7px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;}
.data-list{display:flex;flex-direction:column;gap:8px;padding-top:10px;}
.data-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--off);border-radius:8px;}
.data-item-main{flex:1;min-width:0;}
.data-item-title{display:block;font-size:13px;font-weight:700;color:var(--brown);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.data-item-sub{display:block;font-size:11px;color:var(--brown2);margin-top:2px;}
.data-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0;}
.data-item-price{font-size:12px;font-weight:800;color:var(--gold);}
.data-item-date{font-size:11px;color:#aaa;}
.doc-icon-sm{width:30px;height:30px;background:rgba(200,150,12,.1);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--gold);}
.prop-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.badge-ok{background:#dcfce7;color:#16a34a;}.badge-warn{background:#fef9c3;color:#854d0e;}.badge-neu{background:#f1f5f9;color:#64748b;}
.res-stat{background:var(--off);border-radius:8px;padding:10px;text-align:center;}
.res-stat span{display:block;font-size:11px;color:var(--brown2);margin-bottom:3px;}
.res-stat strong{font-size:13px;color:var(--brown);font-weight:800;}
.anl-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.anl-card{background:var(--off);border-radius:8px;padding:12px;text-align:center;}
.anl-card span{display:block;font-size:11px;color:var(--brown2);margin-bottom:5px;}
.anl-card strong{font-size:15px;font-weight:800;color:var(--gold);}
.perfil-foto-section{display:flex;align-items:center;gap:16px;padding-bottom:16px;border-bottom:1px solid var(--off);margin-bottom:4px;}
.perfil-foto-grande{width:72px;height:72px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800;color:var(--dark);overflow:hidden;cursor:pointer;flex-shrink:0;border:2.5px solid rgba(200,150,12,.3);}
.perfil-foto-info{flex:1;}
.btn-cambiar-foto{margin-top:8px;padding:5px 12px;border-radius:5px;border:1.5px solid var(--border);background:transparent;color:var(--brown2);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.perfil-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--off);}
.perfil-lbl{font-size:12px;color:var(--brown2);font-weight:600;}
.perfil-val{font-size:13px;color:var(--brown);font-weight:700;}
.setting-section-title{font-size:10px;font-weight:700;color:var(--brown2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;padding-top:2px;}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--off);}
.setting-info{display:flex;flex-direction:column;gap:2px;}
.setting-info strong{font-size:13px;color:var(--brown);}
.setting-info span{font-size:12px;color:var(--brown2);}
.btn-outline{padding:7px 16px;border-radius:6px;border:1.5px solid var(--gold);background:transparent;color:var(--gold);font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;}
.btn-outline:hover{background:var(--gold);color:var(--dark);}
.btn-danger{padding:7px 16px;border-radius:6px;border:none;background:#fee2e2;color:#ef4444;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;}
.toggle-wrap{position:relative;display:inline-block;width:40px;height:22px;}
.toggle-wrap input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:22px;transition:.3s;cursor:pointer;}
.toggle-wrap input:checked+.toggle-slider{background:var(--gold);}
.toggle-slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
.toggle-wrap input:checked+.toggle-slider:before{transform:translateX(18px);}
.plan-actual-card{background:var(--off);border-radius:10px;padding:20px;}
.plan-actual-lbl{font-size:11px;color:var(--brown2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}

@media(max-width:800px){
  /* Fix zoom iOS al pulsar input/select */
  input,textarea,select,.fg input,.form-group input,.form-group select{font-size:16px!important;}

  .nav-item,.btn-primary,.btn-secondary,.btn-modal-ok,.btn-modal-cancel,.btn-outline,.btn-danger,.qa-btn,.plan-alert-btn{min-height:44px;}

  .modal-overlay{padding:12px;align-items:flex-start;padding-top:5vh;}

  .data-item-title{white-space:normal;}
}

<script>
(async function(){
  const {initializeApp}=await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js");
  const {getAuth,onAuthStateChanged,signOut,updatePassword,updateEmail,sendPasswordResetEmail,EmailAuthProvider,reauthenticateWithCredential}=await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js");
  const {getFirestore,doc,getDoc,updateDoc}=await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js");
  const {getStorage,ref,uploadBytes,getDownloadURL}=await import("https://www.gstatic.com/firebasejs/10.11.0/firebase-storage.js");
  const app=initializeApp({apiKey:"AIzaSyD5aBVEvNzHQDUa1Y63C7C2NiYnnMTi4_A",authDomain:"troya-app-6dc39.firebaseapp.com",projectId:"troya-app-6dc39",storageBucket:"troya-app-6dc39.firebasestorage.app",messagingSenderId:"135335024771",appId:"1:135335024771:web:5897c4f2bf77552fcce3b6"});
  const auth=getAuth(app),db=getFirestore(app),storage=getStorage(app);
  onAuthStateChanged(auth,async(user)=>{
    if(window._cerrando)return;
    if(!user){location.href="login.html";return;}
    try{
      const snap=await getDoc(doc(db,"usuarios",user.uid));
      const d=snap.exists()?snap.data():{};
      window._dashData={nombre:d.nombre||user.displayName||"Usuario",apellido:d.apellido||"",rol:d.rol||"propietario",plan:d.plan||"basico",email:user.email,uid:user.uid,perfil:d.perfil||{},empresa:d.empresa||{},photoURL:d.photoURL||user.photoURL||""};
      window._signOut=function(){window._cerrando=true;sessionStorage.clear();localStorage.removeItem("troya_auth");signOut(auth).then(()=>{window._cerrando=false;location.href="login.html";}).catch(()=>{window._cerrando=false;location.href="login.html";});};
      window._cambiarPassword=async(o,n)=>{await reauthenticateWithCredential(user,EmailAuthProvider.credential(user.email,o));await updatePassword(user,n);};
      window._cambiarEmail=async(p,e)=>{await reauthenticateWithCredential(user,EmailAuthProvider.credential(user.email,p));await updateEmail(user,e);await updateDoc(doc(db,"usuarios",user.uid),{email:e});};
      window._subirFoto=async(file)=>{const sr=ref(storage,"fotos/"+user.uid+"/perfil.jpg");await uploadBytes(sr,file);const url=await getDownloadURL(sr);await updateDoc(doc(db,"usuarios",user.uid),{photoURL:url});window._dashData.photoURL=url;return url;};
      window._guardarPerfil=async(datos)=>updateDoc(doc(db,"usuarios",user.uid),datos);

function cambiarVista(key, el) {
  var rol = (_dashData&&_dashData.rol)||"propietario";
  var vistas = window.VISTAS[rol]||window.VISTAS["propietario"];
  var contenido = vistas[key];
  if(!contenido) return;

  // Cambiar contenido
  var main = document.getElementById("main-content");
  main.style.opacity="0";
  main.style.transform="translateY(12px)";
  main.style.transition="opacity .25s ease,transform .25s ease";

  setTimeout(function(){
    main.innerHTML = contenido;
    main.style.opacity="1";
    main.style.transform="none";
    // Si es perfil, llenar datos
    if(key==="perfil"&&_dashData) llenarPerfil(_dashData);
    // Si es planes, actualizar nombre del plan
    if(key==="planes"&&_dashData) {
      var lbl=document.getElementById("planes-plan-lbl");
      var nom=document.getElementById("planes-plan-nom");
      if(lbl) lbl.textContent="PLAN "+(PLAN_NOMBRES[_dashData.plan]||_dashData.plan||"BÁSICO").toUpperCase();
      if(nom) nom.textContent=PLAN_NOMBRES[_dashData.plan]||_dashData.plan||"Básico";
    }
    // Si es dashboard, actualizar nombre
    if(key==="dashboard") {
      var wbn=document.getElementById("wb-nombre");
      if(wbn&&_dashData) wbn.textContent=_dashData.nombre;
    }
    // Animar progress bars
    document.querySelectorAll(".progress-fill").forEach(function(bar){
      setTimeout(function(){bar.style.width=bar.dataset.w||"0%";},200);
    });
  },200);

  // Actualizar nav activo
  document.querySelectorAll(".nav-item").forEach(function(n){n.classList.remove("active");});
  if(el) el.classList.add("active");

  // Actualizar topbar
  var t=TITULOS[key]||[key,""];
  document.getElementById("page-title").textContent=t[0];
  document.getElementById("page-subtitle").textContent=t[1];

  if(_sidebarOpen) toggleSidebar();
}

function llenarPerfil(data){
  var av=document.getElementById("perfil-avatar");
  var nom=document.getElementById("perfil-nombre");
  var nom2=document.getElementById("perfil-nombre2");
  var mail=document.getElementById("perfil-email");
  var rol=document.getElementById("perfil-rol");
  var plan=document.getElementById("perfil-plan");
  var ini=(data.nombre||"U").charAt(0).toUpperCase();
  if(av)  av.textContent=ini;
  if(nom) nom.textContent=data.nombre+" "+(data.apellido||"");
  if(nom2)nom2.textContent=data.nombre+" "+(data.apellido||"");
  if(mail)mail.textContent=data.email||"—";
  if(rol) rol.textContent=ROL_NOMBRES[data.rol]||data.rol||"—";
  if(plan)plan.textContent=PLAN_NOMBRES[data.plan]||data.plan||"Básico";
}

function iniciarDashboard(data){
  // Defensa: si por timing las constantes globales aún no están, reintentar
  if(!window.NAV_ITEMS || !window.VISTAS){
    return setTimeout(function(){iniciarDashboard(data);}, 100);
  }
  _dashData=data;
  var rol=data.rol||"propietario";
  var plan=data.plan||"basico";
  var nom=data.nombre||"Usuario";
  var ini=nom.charAt(0).toUpperCase();

  // Sidebar nav
  var sidebarNav=document.getElementById("sidebar-nav");
  if(sidebarNav) sidebarNav.innerHTML=window.NAV_ITEMS[rol]||window.NAV_ITEMS["propietario"];

  // Avatar y nombre
  document.getElementById("user-avatar").textContent=ini;
  document.getElementById("topbar-avatar").textContent=ini;
  document.getElementById("user-name").textContent=nom+" "+(data.apellido||"");
  document.getElementById("user-role-badge").textContent=(ROL_NOMBRES[rol]||rol).toUpperCase();
  document.getElementById("sidebar-plan-name").textContent=PLAN_NOMBRES[plan]||plan;

  // Botón mejorar plan
  var upBtn=document.getElementById("upgrade-btn");
  if(upBtn) upBtn.onclick=function(){iniciarTransicion("planes.html?desde=dashboard&rol="+rol,"Cargando planes");};

  // Cargar vista dashboard
  var vistas=window.VISTAS[rol]||window.VISTAS["propietario"];
  document.getElementById("main-content").innerHTML=vistas["dashboard"]||"";
  var wbn=document.getElementById("wb-nombre");
  if(wbn) wbn.textContent=nom;

  var dl=document.getElementById("dash-layout");
  if(dl)dl.style.display="flex";
  ajustarBotonesPlan(plan);
}

function ajustarBotonesPlan(plan) {
  var esGratis = ['basico','explorador'].indexOf(plan) !== -1;
  if(!esGratis) return;
  document.querySelectorAll('.btn-secondary').forEach(function(btn){
    if(btn.innerHTML.indexOf('Ver mapa') !== -1 || btn.innerHTML.indexOf('Ver mercado') !== -1) {
      btn.style.display = 'none';
    }
  });
  document.querySelectorAll('.qa-btn').forEach(function(btn){
    var label = btn.querySelector('.qa-label');
    if(!label) return;
    var txt = label.textContent.toLowerCase();
    if(txt.indexOf('mapa') !== -1 || txt.indexOf('zona') !== -1 || txt.indexOf('mercado') !== -1) {
      btn.style.opacity='0.45'; btn.style.cursor='not-allowed';
      btn.title='Disponible con plan de pago'; btn.style.position='relative';
      var b=document.createElement('span');
      b.style.cssText='position:absolute;top:7px;right:7px;font-size:9px;font-weight:700;background:rgba(200,150,12,.15);color:#C8960C;padding:2px 6px;border-radius:10px;letter-spacing:.06em;';
      b.textContent='PREMIUM'; btn.appendChild(b);
      btn.onclick=function(e){ e.stopPropagation(); iniciarTransicion('planes.html?desde=dashboard&rol='+((_dashData&&_dashData.rol)||'propietario'),'Cargando planes'); };
    }
  });
}

function toggleSidebar(){
  _sidebarOpen=!_sidebarOpen;
  document.getElementById("sidebar").classList.toggle("open",_sidebarOpen);
  document.getElementById("sidebar-overlay").style.display=_sidebarOpen?"block":"none";
  document.body.style.overflow=_sidebarOpen?"hidden":"";
}

function cerrarSesion(){
  if(window._signOut) window._signOut();
  else location.href="login.html";
}

<div class="page-wrap">\
  '+BANNER_FREE+'\
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:12px">\
    <div>\
      <h2 style="font-size:1.4rem;font-weight:800;color:var(--brown);margin:0 0 4px">Mis reportes</h2>\
      <p style="font-size:13px;color:var(--brown2);margin:0">Historial de valoraciones y análisis.</p>\
    </div>\
    <button class="btn-primary" onclick="cambiarVista(\'valoracion\',null)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Nueva valoración</button>\
  </div>\
  <div class="card">\
    <div class="card-body" style="padding:14px 16px">\
      <div id="reportes-list" class="data-list" style="padding-top:0">\
        <p style="font-size:13px;color:var(--brown2);text-align:center;padding:24px 12px;margin:0">No tienes reportes todavía. <a href="javascript:void(0)" onclick="cambiarVista(\'valoracion\',null)" style="color:var(--gold);font-weight:700;text-decoration:underline">Crea tu primera valoración</a>.</p>\
      </div>\
    </div>\
  </div>\
</div>';
      }
    });

    /* ═══ Lógica para llenar análisis con datos reales ═══ */
    function renderAnalisis(){
      var v = document.getElementById("anl-vals");
      var p = document.getElementById("anl-props");
      var d = document.getElementById("anl-docs");
      var c = document.getElementById("anl-cuota");
      var a = document.getElementById("anl-actividad");
      if(!v) return; // No estamos en la vista de análisis
      var vals = (window._vals||[]).length;
      var props = (window._props||[]).length;
      var docs = (window._docs||[]).length;
      v.textContent = vals;
      p.textContent = props;
      d.textContent = docs;
      c.textContent = vals + "/3";
      // Actividad
      if(a){
        var html = '';
        if(vals===0 && props===0 && docs===0){
          html = '<p style="margin:0">Aún no tienes actividad. Empieza creando una valoración o registrando una propiedad.</p>';
        }else{
          html = '<ul style="margin:0;padding-left:18px">';
          if(vals>0) html += '<li>Has realizado <strong style="color:var(--gold)">'+vals+'</strong> valoración'+(vals>1?'es':'')+' este mes.</li>';
          if(props>0) html += '<li>Tienes <strong style="color:var(--gold)">'+props+'</strong> propiedad'+(props>1?'es':'')+' registrada'+(props>1?'s':'')+'.</li>';
          if(docs>0) html += '<li>Tienes <strong style="color:var(--gold)">'+docs+'</strong> documento'+(docs>1?'s':'')+' guardado'+(docs>1?'s':'')+'.</li>';
          html += '<li style="color:var(--brown2);margin-top:6px;font-size:12.5px">Cuota mensual del Plan Básico: <strong>3 valoraciones</strong>. Te quedan <strong style="color:'+(vals>=3?'#e05454':'#16a34a')+'">'+Math.max(0,3-vals)+'</strong>.</li>';
          html += '</ul>';
        }
        a.innerHTML = html;
      }
    }

    /* ═══ Lógica para llenar mis reportes (inversionista) ═══ */
    function renderReportes(){
      var lst = document.getElementById("reportes-list");
      if(!lst) return;
      var vals = window._vals||[];
      if(vals.length===0) return; // ya tiene el placeholder
      var fmtPeso = window.fmtPeso || function(n){return "$"+(n||0).toLocaleString("es-CO");};
      lst.innerHTML = vals.slice().reverse().map(function(v){
        var fecha = v.fecha instanceof Date ? v.fecha : new Date(v.fecha||Date.now());
        var fechaStr = fecha.toLocaleDateString("es-CO",{day:"2-digit",month:"short",year:"numeric"});
        return '<div class="data-item">'+
          '<div class="doc-icon-sm"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>'+
          '<div class="data-item-main"><span class="data-item-title">'+(v.direccion||"Sin dirección")+'</span><span class="data-item-sub">'+(v.tipo||"—")+' · '+(v.area||0)+' m² · Estrato '+(v.estrato||"—")+'</span></div>'+
          '<div class="data-item-right"><span class="data-item-price">'+fmtPeso(v.precio||0)+'</span><span class="data-item-date">'+fechaStr+'</span></div>'+
        '</div>';
      }).join("");
    }

    /* ═══ Enganchar botones de las vistas que no tienen onclick ═══ */
    function engancharBotones(vista){
      // Buscar botones por texto en el contenido principal
      var main = document.getElementById("main-content");
      if(!main) return;
      var botones = main.querySelectorAll("button, a.btn-primary, a.btn-secondary, .btn-outline, .btn-danger");
      botones.forEach(function(b){
        if(b._engd) return; // ya enganchado
        // Saltar si ya tiene onclick definido en HTML
        if(b.hasAttribute("onclick") && b.getAttribute("onclick").trim().length>0) return;
        // Saltar si ya tiene un handler programático
        if(b.onclick) return;
        var txt = (b.textContent||"").toLowerCase().trim();
        var handler = null;
        // Detección por palabras clave del texto
        if(/editar/.test(txt) && /perfil|datos/.test(txt) || txt==="editar"){
          handler = function(){ if(window.abrirEditarPerfil) window.abrirEditarPerfil(); };
        } else if(/cambiar.*foto|subir.*foto|cambiar foto/.test(txt)){
          handler = function(){ if(window.abrirCambiarFoto) window.abrirCambiarFoto(); };
        } else if(/cambiar.*correo|cambiar.*email/.test(txt)){
          handler = function(){ if(window.abrirCambiarEmail) window.abrirCambiarEmail(); };
        } else if(/cambiar.*contrase|cambiar.*password/.test(txt)){
          handler = function(){ if(window.abrirCambiarPassword) window.abrirCambiarPassword(); };
        } else if(/cerrar sesi|cerrar sesión|salir/.test(txt)){
          handler = function(){ if(window._signOut) window._signOut(); };
        } else if(/(nueva|crear|hacer).*valoraci|valoración inteligente|nueva$/.test(txt) && vista!=="propiedades"){
          handler = function(){ if(window.abrirNuevaValoracion) window.abrirNuevaValoracion(); };
        } else if(/(subir|nuev[oa]|cargar).*document|subir document|\+\s*subir/.test(txt)){
          handler = function(){ if(window.abrirSubirDocumento) window.abrirSubirDocumento(); };
        } else if(/(nueva|registrar|agregar|añadir).*propiedad|nueva propiedad/.test(txt)){
          handler = function(){ if(window.abrirNuevaPropiedad) window.abrirNuevaPropiedad(); };
        } else if(/ver mapa|mapa$/.test(txt)){
          handler = function(){ window.cambiarVista("mapa", null); };
        } else if(/mejorar plan|cambiar plan|ver planes/.test(txt)){
          handler = function(){ window.cambiarVista("planes", null); };
        }
        if(handler){
          b.onclick = handler;
          b.style.cursor = "pointer";
          b._engd = 1;
        }
      });
      // Foto del perfil (avatar grande clicable)
      var fotoPerf = main.querySelector(".perfil-foto-grande, .avatar-grande, [data-action='cambiar-foto']");
      if(fotoPerf && !fotoPerf._engd){
        fotoPerf.onclick = function(){ if(window.abrirCambiarFoto) window.abrirCambiarFoto(); };
        fotoPerf.style.cursor = "pointer";
        fotoPerf._engd = 1;
      }
      // Si la vista es perfil, el botón "Editar" arriba a la derecha
      if(vista==="perfil"){
        // Buscar todos los enlaces/botones con texto "Editar"
        main.querySelectorAll("a, span, button").forEach(function(e){
          if(e._engd) return;
          var t = (e.textContent||"").trim().toLowerCase();
          if(t==="editar" && !e.hasAttribute("onclick")){
            e.onclick = function(ev){ ev.preventDefault(); if(window.abrirEditarPerfil) window.abrirEditarPerfil(); };
            e.style.cursor = "pointer";
            e._engd = 1;
          }
        });
      }
    }

    /* Engancharse a cambiarVista para renderizar después */
    var _cv = window.cambiarVista;
    window.cambiarVista = function(k, el){
      if(_cv) _cv.call(this, k, el);
      setTimeout(function(){
        if(k==="analisis") renderAnalisis();
        if(k==="documentos"){
          var rol=(window._dashData&&window._dashData.rol)||"propietario";
          if(rol==="inversionista") renderReportes();
        }
        engancharBotones(k);
      }, 250);
    };

    /* También enganchar al cargar inicial el dashboard */
    setTimeout(function(){ engancharBotones("dashboard"); }, 1500);
  }
  inject();
})();
</script>

<script>
/* ═══════════════════════════════════════════════════════════════
   PATCH FINAL — Fix valoraciones + Configuración funcional
   Camilo · 2026
═══════════════════════════════════════════════════════════════ */
(function(){
  function setup(){
    if (typeof window.calcularValoracion !== "function" ||
        typeof window.cambiarVista !== "function") {
      setTimeout(setup, 100);
      return;
    }

    /* ─── Helpers ─── */
    var fmtPeso = window.fmtPeso || function(n){return "$"+(n||0).toLocaleString("es-CO");};
    var fmtFecha = window.fmtFecha || function(d){var dt=d instanceof Date?d:new Date(d);return dt.toLocaleDateString("es-CO",{day:"2-digit",month:"short"});};

    /* ─── 1. Refresca TODAS las vistas con los datos actuales ─── */
    window._refrescarTodo = function(){
      try {
        var rol = (window._dashData && window._dashData.rol) || "propietario";
        var vals = window._vals || [];
        var props = window._props || [];
        var docs = window._docs || [];
        var mx = rol === "propietario" ? 1 : 3;
        var main = document.getElementById("main-content");
        if (!main) return;

        /* ── Vista Valoraciones ── */
        var cards = main.querySelectorAll(".card");
        cards.forEach(function(card){
          var pv = card.querySelector(".progress-val");
          var pf = card.querySelector(".progress-fill");
          var empty = card.querySelector(".empty-state");
          if (pv) pv.textContent = vals.length + "/" + mx;
          if (pf) {
            var pct = Math.min(100, Math.round((vals.length / mx) * 100));
            pf.style.width = pct + "%";
            pf.setAttribute("data-w", pct + "%");
          }
          // Reemplazar empty state con lista si hay datos
          if (empty && vals.length > 0) {
            var lista = document.createElement("div");
            lista.className = "data-list";
            lista.innerHTML = vals.slice().reverse().map(function(v){
              return '<div class="data-item">'+
                '<div class="data-item-main">'+
                  '<span class="data-item-title">'+(v.direccion||"Sin dirección")+'</span>'+
                  '<span class="data-item-sub">'+(v.tipo||"—")+' · '+(v.area||0)+' m² · Estrato '+(v.estrato||"—")+'</span>'+
                '</div>'+
                '<div class="data-item-right">'+
                  '<span class="data-item-price">'+fmtPeso(v.precio||0)+'</span>'+
                  '<span class="data-item-date">'+fmtFecha(v.fecha)+'</span>'+
                '</div>'+
              '</div>';
            }).join("");
            empty.parentNode.replaceChild(lista, empty);
          }
        });

        /* ── Vista Dashboard (stat cards) ── */
        var sv = main.querySelectorAll(".stat-val");
        if (sv.length > 0) {
          if (rol === "agencia") {
            if (sv[0]) sv[0].textContent = props.length;
            if (sv[1]) sv[1].textContent = vals.length + "/3";
            if (sv[2]) sv[2].textContent = docs.length;
          } else if (rol === "inversionista") {
            if (sv[0]) sv[0].textContent = vals.length + "/3";
            if (sv[1]) sv[1].textContent = vals.length>0 ? "$"+Math.round(vals.reduce(function(s,v){return s+v.precio;},0)/vals.length/1000000)+"M" : "$0";
          } else {
            if (sv[0]) sv[0].textContent = vals.length + "/1";
            if (sv[1]) sv[1].textContent = docs.length;
          }
        }

        /* ── Vista Análisis ── */
        var av = document.getElementById("anl-vals");
        if (av) {
          av.textContent = vals.length;
          var ap = document.getElementById("anl-props");
          var ad = document.getElementById("anl-docs");
          var ac = document.getElementById("anl-cuota");
          var aa = document.getElementById("anl-actividad");
          if (ap) ap.textContent = props.length;
          if (ad) ad.textContent = docs.length;
          if (ac) ac.textContent = vals.length + "/" + mx;
          if (aa) {
            var html = '';
            if (vals.length===0 && props.length===0 && docs.length===0) {
              html = '<p style="margin:0">Aún no tienes actividad. Empieza creando una valoración o registrando una propiedad.</p>';
            } else {
              html = '<ul style="margin:0;padding-left:18px">';
              if (vals.length>0) html += '<li>Has realizado <strong style="color:var(--gold)">'+vals.length+'</strong> valoración'+(vals.length>1?'es':'')+' este mes.</li>';
              if (props.length>0) html += '<li>Tienes <strong style="color:var(--gold)">'+props.length+'</strong> propiedad'+(props.length>1?'es':'')+' registrada'+(props.length>1?'s':'')+'.</li>';
              if (docs.length>0) html += '<li>Tienes <strong style="color:var(--gold)">'+docs.length+'</strong> documento'+(docs.length>1?'s':'')+' guardado'+(docs.length>1?'s':'')+'.</li>';
              html += '<li style="color:var(--brown2);margin-top:6px;font-size:12.5px">Cuota mensual: <strong>'+mx+' valoración'+(mx>1?'es':'')+'</strong>. Te quedan <strong style="color:'+(vals.length>=mx?'#e05454':'#16a34a')+'">'+Math.max(0,mx-vals.length)+'</strong>.</li>';
              html += '</ul>';
            }
            aa.innerHTML = html;
          }
        }
      } catch(e){
        console.warn("[Troya] Error refrescando vistas:", e);
      }
    };

    /* ─── 2. Wrap calcularValoracion para refrescar después de guardar ─── */
    var _origCalc = window.calcularValoracion;
    window.calcularValoracion = function(){
      var r = _origCalc.apply(this, arguments);
      // Doble refresco con safety net
      setTimeout(window._refrescarTodo, 200);
      setTimeout(window._refrescarTodo, 700);
      return r;
    };

    /* ─── 3. Configuración funcional (toggles + guardar) ─── */
    window._configuracion = {
      notificaciones: true,
      correosActividad: false,
      zonaHoraria: "America/Bogota"
    };

    // Cargar configuración previa desde localStorage
    function cargarConfig(){
      try {
        var uid = (window._dashData && window._dashData.uid) || "anon";
        var saved = localStorage.getItem("troya_config_" + uid);
        if (saved) {
          var parsed = JSON.parse(saved);
          Object.assign(window._configuracion, parsed);
        }
      } catch(e){}
    }

    function guardarConfigLocal(){
      try {
        var uid = (window._dashData && window._dashData.uid) || "anon";
        localStorage.setItem("troya_config_" + uid, JSON.stringify(window._configuracion));
      } catch(e){}
    }

    window._engancharConfiguracion = function(){
      cargarConfig();
      var main = document.getElementById("main-content");
      if (!main) return;

      var cfg = window._configuracion;
      var keys = ["notificaciones", "correosActividad"];

      // Detectar toggles por estilo característico
      var toggles = [];
      main.querySelectorAll("div").forEach(function(el){
        var s = el.getAttribute("style") || "";
        if (s.indexOf("border-radius:12px") > -1 && s.indexOf("cursor:pointer") > -1 && el.querySelector("div")) {
          toggles.push(el);
        }
      });

      if (toggles.length === 0) return; // No estamos en configuración

      toggles.forEach(function(t, idx){
        if (t._cfgEngd) return;
        t._cfgEngd = true;

        var key = keys[idx] || keys[0];
        var ball = t.querySelector("div");

        function aplicar(){
          var on = !!cfg[key];
          t.style.background = on ? "var(--gold)" : "var(--border)";
          if (ball) {
            ball.style.transition = "all .2s";
            if (on) { ball.style.right = "2px"; ball.style.left = "auto"; }
            else    { ball.style.left = "2px";  ball.style.right = "auto"; }
          }
        }
        aplicar();

        t.onclick = function(){
          cfg[key] = !cfg[key];
          aplicar();
          guardarConfigLocal();
        };
      });

      // Botón "Guardar cambios"
      main.querySelectorAll("button").forEach(function(btn){
        if (btn._cfgEngd) return;
        var txt = (btn.textContent || "").trim().toLowerCase();
        if (txt.indexOf("guardar") > -1) {
          btn._cfgEngd = true;
          btn.onclick = function(){
            guardarConfigLocal();
            if (window._guardarPerfil) {
              try { window._guardarPerfil({ "perfil.configuracion": cfg }); } catch(e){}
            }
            if (window.toast) window.toast("Configuración guardada", "ok");
          };
        }
      });
    };

    /* ─── 4. Wrap cambiarVista para refresco y configuración ─── */
    var _origCv = window.cambiarVista;
    window.cambiarVista = function(k, el){
      _origCv.call(this, k, el);
      setTimeout(window._refrescarTodo, 300);
      if (k === "settings") {
        setTimeout(window._engancharConfiguracion, 400);
        setTimeout(window._engancharConfiguracion, 800);
      }
    };

    /* ─── 5. Enganchar botón "+ Nueva" en la vista de valoraciones ─── */
    window._engancharNueva = function(){
      var main = document.getElementById("main-content");
      if (!main) return;
      // Buscar el .card-action (texto "Nueva") y los botones de empty state
      main.querySelectorAll(".card-action").forEach(function(el){
        if (el._nuevaEngd) return;
        var txt = (el.textContent || "").trim().toLowerCase();
        if (txt.indexOf("nueva") > -1) {
          el._nuevaEngd = true;
          el.style.cursor = "pointer";
          el.onclick = function(){
            if (window.abrirNuevaValoracion) window.abrirNuevaValoracion();
          };
        }
      });
      // También los botones primary que digan "Nueva valoración"
      main.querySelectorAll("button.btn-primary").forEach(function(btn){
        if (btn._nuevaEngd) return;
        var txt = (btn.textContent || "").trim().toLowerCase();
        if (txt.indexOf("nueva valoración") > -1 || txt.indexOf("nueva valoracion") > -1) {
          btn._nuevaEngd = true;
          btn.onclick = function(){
            if (window.abrirNuevaValoracion) window.abrirNuevaValoracion();
          };
        }
      });
    };

    /* Wrap cambiarVista para enganchar también el botón "+ Nueva" */
    var _origCv2 = window.cambiarVista;
    window.cambiarVista = function(k, el){
      _origCv2.call(this, k, el);
      setTimeout(window._engancharNueva, 350);
    };

    /* ─── 6. Refresco inicial ─── */
    setTimeout(window._refrescarTodo, 1800);
    setTimeout(window._engancharNueva, 2000);
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", setup);
  } else {
    setup();
  }
})();
</script>
</body>
</html>
